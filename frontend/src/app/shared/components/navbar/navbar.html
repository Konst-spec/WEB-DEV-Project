<nav class="navbar" id="main-navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand">
      <span class="brand-icon">🎓</span>
      <span class="brand-text">KBTU<span class="brand-accent">Review</span></span>
    </a>

    <div class="navbar-menu">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a>
      <a routerLink="/subjects" routerLinkActive="active" class="nav-link">Subjects</a>
      <a routerLink="/professors" routerLinkActive="active" class="nav-link">Professors</a>
      <a routerLink="/wishlist" routerLinkActive="active" class="nav-link">Wishlist</a>
    </div>

    <div class="navbar-auth">
      @if (!isAuthenticated()) {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Log in</a>
        <a routerLink="/register" routerLinkActive="active" class="nav-link nav-link-highlight">Sign up</a>
      }

      @if (isAuthenticated()) {
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">Profile</a>
        <button (click)="logout()" class="nav-link logout-btn">Logout</button>
      }
    </div>
  </div>
</nav>
